<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Book Inventory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>Book Inventory</h1>
    <div>
      <table>
        <thead>
          <tr>
            <th class="title_header">Title</th>
            <th class="author_header">Author</th>
            <th class="category_header">Category</th>
            <th class="status_header">Status</th>
            <th class="rate_header">Rate</th>
          </tr>
        </thead>
        <tbody>
          <tr class="to-read">
            <td>1984</td>
            <td>George Orwell</td>
            <td>Fiction</td>
            <td><span class="status">To Read</span></td>
            <td>
              <span class="rate one"
                ><span></span><span></span><span></span
              ></span>
            </td>
          </tr>

          <tr class="read">
            <td>2001: A Space Odyssey</td>
            <td>Arthur C. Clarke</td>
            <td>Science Fiction</td>
            <td><span class="status">Read</span></td>
            <td>
              <span class="rate two"
                ><span></span><span></span><span></span
              ></span>
            </td>
          </tr>
          <tr class="in-progress">
            <td>Flowers for Algernon</td>
            <td>Daniel Keyes</td>
            <td>Science Fiction</td>
            <td><span class="status">In Progress</span></td>
            <td>
              <span class="rate"><span></span><span></span><span></span></span>
            </td>
          </tr>

          <tr class="read">
            <td>Pride and Prejudice</td>
            <td>Jane Austen</td>
            <td>Romance</td>
            <td><span class="status">Read</span></td>
            <td>
              <span class="rate three"
                ><span></span><span></span><span></span
              ></span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
