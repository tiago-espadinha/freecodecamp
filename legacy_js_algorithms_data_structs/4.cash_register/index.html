<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="container">
      <h1>Cash Register Project</h1>
      <div id="screen">
        <div>Total</div>
        <div id="price-screen"></div>
        <div>Status</div>
        <div id="status-screen"></div>
      </div>
      <div id="costumer-cash">
        <input type="number" id="cash" placeholder="Enter cash from customer" />
        <button id="purchase-btn">Purchase</button>
      </div>
      <div id="currency-grid">
        <div id="pennies">Pennies</div>
        <div id="nickels">Nickels</div>
        <div id="dimes">Dimes</div>
        <div id="quarters">Quarters</div>
        <div id="ones">Ones</div>
        <div id="fives">Fives</div>
        <div id="tens">Tens</div>
        <div id="twenties">Twenties</div>
        <div id="hundreds">Hundreds</div>
      </div>
    </div>
    <div id="change-due"></div>
    <script src="script.js"></script>
  </body>
</html>
